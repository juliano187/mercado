<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Mercado da Júlia 🛒" />
    <meta property="og:description" content="O mercadinho mais fofo da cidade! Brinque de vender e calcular troco." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://img.icons8.com/fluency/240/shopping-cart.png" />
    <title>Mercado da Júlia 🛒</title>
    
    <link rel="icon" href="https://fav.farm/🛒" />

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --accent: #fd79a8;
            --danger: #d63031;
            --bg: #fdf2f7;
            --card-blue: #3498db;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .loja-header { text-align: center; margin-bottom: 20px; }
        .loja-header h1 { color: var(--accent); font-size: 2.2rem; margin: 0; text-shadow: 2px 2px 0px #fff; }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 500px; 
            border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            padding: 20px; 
            margin-bottom: 20px; 
            box-sizing: border-box; 
        }

        h2 { color: var(--primary); margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        
        .btn-save { 
            background: var(--accent); color: white; padding: 15px; width: 100%; border: none; 
            border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 0 #e84393;
        }

        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }

        .product-container { position: relative; }
        
        .product-btn { 
            background: #fff; padding: 15px 5px; border-radius: 12px; cursor: pointer;
            border: 2px solid #f1f2f6; display: flex; flex-direction: column; align-items: center;
            transition: all 0.2s ease; width: 100%; box-sizing: border-box;
        }
        .product-btn:active { transform: scale(0.95); background: #e8f8f5; }

        .remove-prod {
            position: absolute; top: -5px; right: -5px; background: var(--danger);
            color: white; border-radius: 50%; width: 22px; height: 22px;
            font-size: 12px; border: 2px solid white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10;
        }

        .receipt { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .receipt td { padding: 10px 5px; border-bottom: 1px dashed #dfe6e9; }
        .btn-del-item { color: var(--danger); cursor: pointer; font-weight: bold; width: 30px; text-align: center; }

        .payment-area { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-top: 20px; border-left: 5px solid var(--secondary); }
        .row-money { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .row-money label { font-weight: bold; color: #444; font-size: 0.9rem; }
        .row-money span { font-size: 1.3rem; font-weight: bold; color: #2d3436; }
        .input-money { width: 100px; text-align: right; border: 2px solid var(--secondary); padding: 8px; border-radius: 8px; font-size: 1rem; font-weight: bold; }
        
        .btn-card {
            background: var(--card-blue); color: white; width: 100%; padding: 12px; margin-top: 10px;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-card:disabled { background: #bdc3c7; cursor: not-allowed; }

        .btn-clear { background: var(--primary); color: white; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #status-cartao { font-size: 0.85rem; text-align: center; margin-top: 8px; font-weight: bold; min-height: 1.2rem; }
    </style>
</head>
<body>

    <div class="loja-header">
        <h1>🍓 Mercado da Júlia 🍭</h1>
    </div>

    <div class="card">
        <h2>📦 Abastecer Prateleiras</h2>
        <div class="grid-input">
            <input type="text" id="reg-nome" placeholder="Produto">
            <input type="number" id="reg-preco" placeholder="Preço R$">
        </div>
        <button class="btn-save" onclick="cadastrarNoEstoque()">Colocar na Vitrine +</button>
        <div class="shelf" id="prateleira"></div>
    </div>

    <div class="card">
        <h2>💰 Cupom Fiscal</h2>
        <table class="receipt">
            <tbody id="carrinho-corpo"></tbody>
        </table>
        
        <div class="payment-area">
            <div class="row-money">
                <label>TOTAL:</label>
                <span id="total-venda">R$ 0.00</span>
            </div>
            <div class="row-money">
                <label>RECEBIDO:</label>
                <input type="number" id="pago" class="input-money" placeholder="0.00" oninput="calcularTroco()">
            </div>
            <div class="row-money" style="border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px;">
                <label>TROCO:</label>
                <span id="troco-valor" style="color: var(--danger)">R$ 0.00</span>
            </div>

            <button id="btn-cartao" class="btn-card" onclick="pagarComCartao()">💳 Pagar com Cartão</button>
            <div id="status-cartao"></div>
        </div>

        <button class="btn-clear" onclick="novaVenda()">Próximo Cliente 🛍️</button>
    </div>

    <script>
        let totalGeral = 0;

        // Função para gerar o som de "Beep" sem arquivos externos
        function tocarBeep() {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = context.createOscillator();
                const gainNode = context.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(context.destination);

                oscillator.type = "sine"; 
                oscillator.frequency.value = 880; 
                gainNode.gain.setValueAtTime(0.1, context.currentTime);

                oscillator.start();
                setTimeout(() => oscillator.stop(), 200);
            } catch (e) {
                console.log("Áudio não suportado ou bloqueado pelo navegador");
            }
        }

        function pagarComCartao() {
            if (totalGeral <= 0) {
                alert("Júlia, o carrinho está vazio! 🛒");
                return;
            }

            const btn = document.getElementById('btn-cartao');
            const status = document.getElementById('status-cartao');

            btn.disabled = true;
            btn.innerText = "⏳ Processando...";
            status.innerText = "Aproxime o cartão na maquininha...";
            status.style.color = "#7f8c8d";

            // Espera 5 segundos
            setTimeout(() => {
                tocarBeep(); 
                
                btn.innerText = "✅ Aprovado!";
                btn.style.background = "var(--secondary)";
                status.innerText = "Pagamento concluído com sucesso!";
                status.style.color = "var(--secondary)";

                // Reseta o botão após um tempo para a próxima venda
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "💳 Pagar com Cartão";
                    btn.style.background = "var(--card-blue)";
                    status.innerText = "";
                }, 3000);

            }, 5000); 
        }

        function cadastrarNoEstoque() {
            const nomeInput = document.getElementById('reg-nome');
            const precoInput = document.getElementById('reg-preco');
            const nome = nomeInput.value.trim();
            const preco = parseFloat(precoInput.value);

            if (!nome || isNaN(preco)) {
                alert("Júlia, preencha o nome e o preço! 😊");
                return;
            }

            const prateleira = document.getElementById('prateleira');
            const container = document.createElement('div');
            container.className = 'product-container';
            
            container.innerHTML = `
                <button class="remove-prod" onclick="this.parentElement.remove()">X</button>
                <div class="product-btn" onclick="adicionarAoCarrinho('${nome}', ${preco})">
                    <strong>${nome}</strong>
                    <span style="color:var(--secondary)">R$ ${preco.toFixed(2)}</span>
                </div>
            `;
            
            prateleira.appendChild(container);
            nomeInput.value = ''; precoInput.value = ''; nomeInput.focus();
        }

        function adicionarAoCarrinho(nome, preco) {
            const corpo = document.getElementById('carrinho-corpo');
            const row = corpo.insertRow();
            row.innerHTML = `
                <td onclick="removerItemCarrinho(this, ${preco})" class="btn-del-item">✕</td>
                <td style="width: 60%"><strong>${nome}</strong></td>
                <td style="width: 40%; text-align: right;">R$ ${preco.toFixed(2)}</td>
            `;
            atualizarTotal(preco);
        }

        function removerItemCarrinho(celula, preco) {
            celula.parentElement.remove();
            atualizarTotal(-preco);
        }

        function atualizarTotal(valor) {
            totalGeral += valor;
            if (totalGeral < 0) totalGeral = 0;
            document.getElementById('total-venda').innerText = `R$ ${totalGeral.toFixed(2)}`;
            calcularTroco();
        }

        function calcularTroco() {
            const pago = parseFloat(document.getElementById('pago').value) || 0;
            const troco = pago - totalGeral;
            const trocoDisplay = document.getElementById('troco-valor');
            
            if (pago > 0 && troco >= 0) {
                trocoDisplay.innerText = `R$ ${troco.toFixed(2)}`;
                trocoDisplay.style.color = "#00b894";
            } else {
                trocoDisplay.innerText = `R$ 0.00`;
                trocoDisplay.style.color = "#d63031";
            }
        }

        function novaVenda() {
            if(confirm("Deseja limpar o cupom para o próximo cliente?")) {
                document.getElementById('carrinho-corpo').innerHTML = '';
                document.getElementById('pago').value = '';
                totalGeral = 0;
                document.getElementById('total-venda').innerText = 'R$ 0.00';
                document.getElementById('troco-valor').innerText = 'R$ 0.00';
                document.getElementById('status-cartao').innerText = '';
            }
        }
    </script>
</body>
</html>
