<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mercado da Júlia 🛒</title>
    <link rel="icon" href="https://fav.farm/🛒" />

    <meta property="og:title" content="Mercado da Júlia 🛒" />
    <meta property="og:description" content="O mercadinho mais fofo da cidade! Brinque de vender e calcular troco." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://img.icons8.com/fluency/240/shopping-cart.png" />
    <meta property="og:image:width" content="240" />
    <meta property="og:image:height" content="240" />
    <meta property="og:url" content="https://mercadodajulia.brincadeira" />

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --accent: #fd79a8;
            --danger: #d63031;
            --bg: #fdf2f7;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .loja-header { text-align: center; margin-bottom: 20px; }
        .loja-header h1 { color: var(--accent); font-size: 2.2rem; margin: 0; text-shadow: 2px 2px 0px #fff; }

        .card { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; box-sizing: border-box; position: relative; }
        h2 { color: var(--primary); margin-top: 0; font-size: 1.1rem; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn-save { background: var(--accent); color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #e84393; }
        .btn-save:active { transform: translateY(2px); box-shadow: 0 2px 0 #e84393; }

        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }
        .product-container { position: relative; }
        .product-btn { background: #fff; padding: 15px 5px; border-radius: 12px; cursor: pointer; border: 2px solid #f1f2f6; display: flex; flex-direction: column; align-items: center; transition: all 0.2s ease; width: 100%; box-sizing: border-box; }
        .product-btn:active { transform: scale(0.95); background: #e8f8f5; }
        .remove-prod { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; border: 2px solid white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10; }

        .receipt { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .receipt td { padding: 10px 5px; border-bottom: 1px dashed #dfe6e9; }
        .btn-del-item { color: var(--danger); cursor: pointer; font-weight: bold; width: 30px; }

        .payment-area { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-top: 20px; border-left: 5px solid var(--secondary); }
        .row-money { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .row-money label { font-weight: bold; color: #444; }
        .row-money span { font-size: 24px; font-weight: bold; color: #2d3436; }
        .input-money { width: 100px; text-align: right; border: 2px solid var(--secondary); padding: 8px; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .troco-text { color: var(--danger); font-size: 26px; font-weight: bold; }

        .btn-clear { background: var(--primary); color: white; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
