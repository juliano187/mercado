<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado da Júlia 🛒</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --accent: #fd79a8;
            --danger: #d63031;
            --bg: #fdf2f7; /* Um fundinho levemente rosado */
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título Principal */
        .loja-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .loja-header h1 {
            color: var(--accent);
            font-size: 2.2rem;
            margin: 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
            border: 2px solid #fff;
        }

        h2 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; border-bottom: 2px solid #f1f2f6; padding-bottom: 10px; }
        
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { padding: 12px; border: 2px solid #edf2f7; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        
        .btn-save { 
            background: var(--accent); 
            color: white; 
            padding: 15px; 
            width: 100%; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #e84393;
        }
        .btn-save:active { transform: translateY(2px); box-shadow: 0 2px 0 #e84393; }

        .shelf { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
            margin-top: 20px; 
        }

        .product-btn { 
            background: #fff; 
            padding: 15px 10px; 
            border-radius: 12px; 
            cursor: pointer;
            border: 2px solid #f1f2f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .product-btn:active { 
            transform: scale(0.92); 
            background: #e8f8f5;
            border-color: var(--secondary);
        }

        .product-btn strong { color: #2d3436; margin-bottom: 5px; pointer-events: none; }
        .product-btn span { font-size: 13px; color: var(--secondary); font-weight: bold; pointer-events: none; }

        .receipt { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .receipt td { padding: 12px 5px; border-bottom: 1px dashed #dfe6e9; font-size: 16px; }
        
        .total-row { 
            font-size: 28px; 
            font-weight: bold; 
            text-align: right; 
            margin-top: 20px; 
            color: #2d3436;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--secondary);
        }

        .btn-clear { background: var(--danger); color: white; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="loja-header">
        <h1>🍓 Mercado da Júlia 🍭</h1>
        <p style="margin: 5px 0; color: #636e72;">Seja bem-vindo(a) à nossa loja!</p>
    </div>

    <div class="card">
        <h2>📦 Abastecer Prateleiras</h2>
        <div class="grid-input">
            <input type="text" id="reg-nome" placeholder="Nome do item">
            <input type="number" id="reg-preco" placeholder="Preço R$">
        </div>
        <button class="btn-save" onclick="cadastrarNoEstoque()">Colocar na Loja +</button>
        
        <div class="shelf" id="prateleira">
            </div>
    </div>

    <div class="card">
        <h2>💰 Cupom Fiscal (Caixa)</h2>
        <table class="receipt">
            <tbody id="carrinho-corpo"></tbody>
        </table>
        
        <div class="total-row">
            Total: R$ <span id="total-venda">0.00</span>
        </div>

        <button class="btn-clear" onclick="novaVenda()">Finalizar Venda 🛍️</button>
    </div>

    <script>
        let totalGeral = 0;

        function cadastrarNoEstoque() {
            const nomeInput = document.getElementById('reg-nome');
            const precoInput = document.getElementById('reg-preco');
            const nome = nomeInput.value.trim();
            const preco = parseFloat(precoInput.value);

            if (nome === '' || isNaN(preco)) {
                alert("Júlia, coloque o nome e o preço do produto! 😊");
                return;
            }

            const prateleira = document.getElementById('prateleira');
            const btn = document.createElement('div');
            btn.className = 'product-btn';
            btn.onclick = function() { adicionarAoCarrinho(nome, preco); };
            btn.innerHTML = `<strong>${nome}</strong><span>R$ ${preco.toFixed(2)}</span>`;
            
            prateleira.appendChild(btn);
            nomeInput.value = '';
            precoInput.value = '';
            nomeInput.focus();
        }

        function adicionarAoCarrinho(nome, preco) {
            const corpo = document.getElementById('carrinho-corpo');
            const row = corpo.insertRow();
            row.innerHTML = `<td style="width: 60%"><strong>${nome}</strong></td><td style="width: 40%; text-align: right;">R$ ${preco.toFixed(2)}</td>`;

            totalGeral += preco;
            document.getElementById('total-venda').innerText = totalGeral.toFixed(2);
        }

        function novaVenda() {
            if(confirm("Deseja fechar a conta do cliente e começar outra?")) {
                document.getElementById('carrinho-corpo').innerHTML = '';
                totalGeral = 0;
                document.getElementById('total-venda').innerText = '0.00';
            }
        }
    </script>
</body>
</html>
